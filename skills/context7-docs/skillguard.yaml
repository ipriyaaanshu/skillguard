name: context7-docs
version: 1.0.0
description: Fetch current, version-pinned library documentation at query time to prevent hallucinated APIs
author: skillguard-official
license: Apache-2.0
upstream: https://github.com/upstash/context7

permissions:
  network:
    - domain: "context7.com"
      methods: [GET]
      ports: [443]
    - domain: "*.context7.com"
      methods: [GET]
      ports: [443]
  filesystem: []
  subprocess: false

adapters:
  openclaw: ">=2.0"
  langchain: ">=0.3"
  mcp: ">=1.0"

build:
  reproducible: true
  base: "skillguard/python:3.11-minimal"
  dependencies:
    - httpx>=0.27.0

security:
  slsa_level: 3

actions:
  - name: resolve_library
    description: Find the Context7-compatible library ID for a package name
    parameters:
      library_name:
        type: string
        description: Library name to search for (e.g., "react", "fastapi", "sqlalchemy")
    returns:
      type: array
      description: List of matching libraries with IDs and descriptions

  - name: get_docs
    description: Fetch documentation for a specific library and topic
    parameters:
      library_id:
        type: string
        description: Context7 library ID (e.g., "/vercel/next.js", "/tiangolo/fastapi")
      topic:
        type: string
        description: Topic or feature to retrieve docs for (e.g., "authentication", "routing")
      tokens:
        type: integer
        description: Approximate token budget for returned docs (default 5000, max 20000)
    returns:
      type: string
      description: Relevant documentation content in Markdown

keywords:
  - documentation
  - docs
  - library
  - api-reference
  - context7
  - up-to-date
