name: brave-search
version: 1.0.0
description: Privacy-first web and news search via Brave Search API
author: skillguard-official
license: Apache-2.0
upstream: https://github.com/modelcontextprotocol/servers/tree/main/src/brave-search

permissions:
  network:
    - domain: "api.search.brave.com"
      methods: [GET]
      ports: [443]
  filesystem: []
  subprocess: false
  environment:
    - name: "BRAVE_API_KEY"
      required: true
      sensitive: true

adapters:
  openclaw: ">=2.0"
  langchain: ">=0.3"
  mcp: ">=1.0"

build:
  reproducible: true
  base: "skillguard/python:3.11-minimal"
  dependencies:
    - httpx>=0.27.0

security:
  slsa_level: 3

actions:
  - name: search
    description: Search the web using Brave Search
    parameters:
      query:
        type: string
        description: Search query
      count:
        type: integer
        description: Number of results to return (1-20, default 10)
      freshness:
        type: string
        description: "Filter by date: pd (past day), pw (past week), pm (past month)"
    returns:
      type: object
      description: Search results with web and news results

  - name: search_news
    description: Search recent news articles
    parameters:
      query:
        type: string
        description: News search query
      count:
        type: integer
        description: Number of results to return (1-20, default 10)
      freshness:
        type: string
        description: "Filter by date: pd (past day), pw (past week), pm (past month)"
    returns:
      type: array
      description: List of news article results

keywords:
  - search
  - web
  - news
  - brave
  - privacy
  - real-time
