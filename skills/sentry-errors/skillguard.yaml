name: sentry-errors
version: 1.0.0
description: Sentry error monitoring — full stack traces, breadcrumbs, release context, and issue management
author: skillguard-official
license: Apache-2.0
upstream: https://mcp.sentry.dev

permissions:
  network:
    - domain: "sentry.io"
      methods: [GET, PUT, POST, DELETE]
      ports: [443]
    - domain: "*.sentry.io"
      methods: [GET, PUT, POST]
      ports: [443]
  filesystem: []
  subprocess: false
  environment:
    - name: "SENTRY_AUTH_TOKEN"
      required: true
      sensitive: true
    - name: "SENTRY_ORG"
      required: true
      sensitive: false

adapters:
  openclaw: ">=2.0"
  langchain: ">=0.3"
  mcp: ">=1.0"

build:
  reproducible: true
  base: "skillguard/python:3.11-minimal"
  dependencies:
    - httpx>=0.27.0

security:
  slsa_level: 3

actions:
  - name: list_issues
    description: List error issues from a Sentry project
    parameters:
      project:
        type: string
        description: Sentry project slug
      query:
        type: string
        description: Sentry search query (default: "is:unresolved")
      limit:
        type: integer
        description: Number of issues to return (default 25, max 100)
    returns:
      type: array
      description: List of error issues with title, count, and last seen

  - name: get_issue
    description: Get full details of a specific Sentry issue including stack trace
    parameters:
      issue_id:
        type: string
        description: Sentry issue ID
    returns:
      type: object
      description: Full issue with stack trace, breadcrumbs, user context, and tags

  - name: get_latest_event
    description: Get the most recent event for an issue with full exception context
    parameters:
      issue_id:
        type: string
        description: Sentry issue ID
    returns:
      type: object
      description: Latest event with exception, breadcrumbs, request, and user data

  - name: resolve_issue
    description: Mark a Sentry issue as resolved
    parameters:
      issue_id:
        type: string
        description: Sentry issue ID to resolve
    returns:
      type: object
      description: Updated issue status

  - name: list_projects
    description: List all Sentry projects in the organization
    parameters: {}
    returns:
      type: array
      description: List of projects with name, slug, and platform

keywords:
  - sentry
  - errors
  - monitoring
  - stack-trace
  - debugging
  - production
